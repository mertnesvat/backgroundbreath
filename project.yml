name: BackgroundBreath
options:
  bundleIdPrefix: com.backgroundbreath
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.backgroundbreath.app

targets:
  BackgroundBreath:
    type: application
    platform: macOS
    sources:
      - path: BackgroundBreath
        excludes:
          - "**/*.md"
    info:
      path: BackgroundBreath/Info.plist
      properties:
        CFBundleName: BackgroundBreath
        CFBundleDisplayName: BackgroundBreath
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        INFOPLIST_FILE: BackgroundBreath/Info.plist
        PRODUCT_NAME: BackgroundBreath
