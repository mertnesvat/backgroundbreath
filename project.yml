name: BackgroundBreath
options:
  bundleIdPrefix: com.StudioNext
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.StudioNext.Breathe

targets:
  BackgroundBreath:
    type: application
    platform: macOS
    sources:
      - path: BackgroundBreath
        excludes:
          - "**/*.md"
    info:
      path: BackgroundBreath/Info.plist
      properties:
        CFBundleName: BackgroundBreath
        CFBundleDisplayName: BackgroundBreath
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        INFOPLIST_FILE: BackgroundBreath/Info.plist
        PRODUCT_NAME: BackgroundBreath
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BackgroundBreathTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BackgroundBreathTests
    dependencies:
      - target: BackgroundBreath
    settings:
      base:
        PRODUCT_NAME: BackgroundBreathTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BackgroundBreath.app/Contents/MacOS/BackgroundBreath"
